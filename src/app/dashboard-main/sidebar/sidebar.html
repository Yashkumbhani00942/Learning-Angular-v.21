<div class="sidebar-main vh-100 position-relative d-flex flex-column flex-shrink-0">
    <a routerLink="/home" class="app-logo py-2 px-3 overflow-hidden d-flex align-items-center link-dark text-decoration-none">
        <img class="logo-shape" src="/assets/images/srkaycg-logo-shap.png" alt="srkaycg-logo-shape">
        <img class="full-logo" src="/assets/images/srkaycg-logo.png" alt="srkaycg-logo">
    </a>

    <div (click)="onToggleClick()" [attr.aria-label]="isExpanded ? 'Collapse sidebar' : 'Expand sidebar'" class="arrow-btn position-absolute d-flex flex-row justify-content-center align-items-center">
        <i class="pi pi-angle-right" [class.rotated]="!isExpanded"></i>
    </div>

    <ul class="nav flex-column m-2 mt-3 mb-auto overflow-x-hidden overflow-y-auto">
        <li class="nav-item mb-2">
            <a class="nav-link w-100 p-0 d-inline-flex align-items-center" routerLinkActive="active" routerLink="/home">
                <i class="pi pi-objects-column"></i> <span class="menu-item">Home</span> 
            </a>
        </li>
        <li class="nav-item mb-2">
            <a class="nav-link w-100 p-0 d-inline-flex align-items-center" routerLinkActive="active" routerLink="/product">
                <i class="pi pi-box"></i> <span class="menu-item">Product</span> 
            </a>
        </li>
        <li class="nav-item mb-2">
            <a class="nav-link w-100 p-0 d-inline-flex align-items-center" routerLinkActive="active" routerLink="/about">
                <i class="pi pi-info-circle"></i> <span class="menu-item">About</span> 
            </a>
        </li>
        <li class="nav-item mb-2">
            <a class="nav-link w-100 p-0 d-inline-flex align-items-center" routerLinkActive="active" routerLink="/contact">
                <i class="pi pi-twitch"></i> <span class="menu-item">Contact</span> 
            </a>
        </li>
        <li class="nav-item mb-2">
            <a class="nav-link w-100 p-0 d-inline-flex align-items-center" routerLinkActive="active" routerLink="/userlist">
                <i class="pi pi-users"></i> <span class="menu-item">User List</span> 
            </a>
        </li>
        <li class="nav-item mb-2">
            <a class="nav-link w-100 p-0 d-inline-flex align-items-center" routerLinkActive="active" routerLink="/form">
                <i class="pi pi-address-book"></i> <span class="menu-item">Form</span> 
            </a>
        </li>
    </ul>

</div>
