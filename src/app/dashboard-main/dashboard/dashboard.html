<div 
    class="dashboard-demo position-relative d-flex" 
    [class.sidebar-collapsed]="!isSidebarExpanded" 
    [class.sidebar-expanded]="isSidebarExpanded">
    <!-- Sidebar Content -->
    <app-sidebar 
        class="left-sidebar d-block" 
        (toggleSidebar)="toggleSidebar()" 
        [isExpanded]="isSidebarExpanded">
    </app-sidebar>
    
    <!-- Main Content Area -->
    <div class="dashboard-right-content d-flex flex-column">
        <!-- Header Content -->
        <app-header></app-header>
        <!-- Page Content -->
        <main class="content-area flex-grow-1 overflow-auto">   
            <router-outlet ></router-outlet>
        </main>
    </div>
</div>
