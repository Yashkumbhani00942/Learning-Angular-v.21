<div class="form-page-main h-100 d-flex flex-row">
  <div class="left-form-content h-100">
    <div class="form-main h-100 d-flex flex-column justify-content-center">
  
      <div class="brand-logo">
        <img src="/assets/images/srkaycg-logo-shap.png" alt="srkcg-icon">
      </div>
  
      <div class="auth-page-title">
        <h4 class="form-title mb-1">Welcome back!</h4>
        <span class="form-subtitle d-block">Please enter your credentials to sign in!</span>
      </div>
  
      <form class="sign-up-form">
  
        <div class="col-md-12 input-field-group">
          <label for="Email" class="form-label d-block">Email</label>
          <input formControlName="lastName" type="text" class="form-control" id="Email" placeholder="Email">
        </div>
  
        <div class="col-md-12 input-field-group mb-0">
          <label for="password" class="form-label d-block">Password</label>
          <input formControlName="lastName" type="password" class="form-control" id="password" placeholder="Password">
        </div>
        <div class="forgot-title-line mt-2 mb-4">
            <a href="#">Forgot Password</a>
        </div>
  
        <div class="col-md-12">
          <button class="btn btn-primary submit-btn w-100" type="button" name="">Sign In</button>
        </div>
  
      </form>
  
      <div class="signin-title-line mt-4 text-center">
        <span>Don`t have an account yet? </span>
        <a href="#">Sign up</a>
      </div>
    </div>
  </div>
  <div class="form-right-ui">
    <!-- <img class="w-100 position-absolute" src="/assets/images/auth-side-bg.png" alt="auth-right-background"> -->
  </div>
</div>
